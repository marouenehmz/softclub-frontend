<section class="contact-page soft-container">
  <div class="contact-header">
    <p>Retrouvez notre emplacement et toutes les informations utiles pour nous joindre.</p>
  </div>

  <div class="contact-content">
    <div class="map-card">
      <iframe
        [src]="mapUrl"
        width="100%"
        height="100%"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      >
      </iframe>
    </div>

    <div class="info-card">
      <h2>Informations</h2>

      <div class="info-item">
        <h3>Adresse</h3>
        <p>{{ address }}</p>
      </div>

      <div class="info-item">
        <h3>Téléphone</h3>
        <p>
          <a [href]="'tel:' + phone">{{ phone }}</a>
        </p>
      </div>

      <div class="info-item">
        <h3>Email</h3>
        <p>
          <a [href]="'mailto:' + email">{{ email }}</a>
        </p>
      </div>

      <div class="info-item">
        <h3>Horaires</h3>
        <p>Lundi - Dimanche : 14h00 - 02h00</p>
      </div>

      <div class="contact-actions">
        <a class="soft-btn" [href]="'tel:' + phone">Appeler</a>
        <a class="soft-btn-outline" [href]="'mailto:' + email">Envoyer un email</a>
      </div>
    </div>
  </div>
</section>
