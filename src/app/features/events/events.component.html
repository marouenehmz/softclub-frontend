@if (hasEvents) {
  <div class="events-list">
    <!-- liste des événements -->
  </div>
} @else {
  <div class="content soft-container">
    <div class="grid">
      <div class="left">
        <p class="tag">SOFT CLUB</p>
        <h1 class="title">Événements</h1>

        <p class="subtitle">
          Des tournois, soirées VIP et expériences gaming uniques arrivent bientôt.
        </p>
      </div>

      <div class="right">
        <div class="coming-card">
          <div class="badge">
            <i class="fa-solid fa-bolt"></i>
            Prochains événements en approche
          </div>

          <p class="description">Reste connecté pour ne rien manquer 🔥</p>
        </div>
      </div>
    </div>
  </div>
}
