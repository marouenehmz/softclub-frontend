<section class="soft-container py-16">
  <h1 class="soft-section-title">Événements</h1>
  <div class="grid gap-6 md:grid-cols-3">
    @for (event of events(); track event.id) {
      <article class="soft-panel p-6">
        <p class="mb-2 text-xs uppercase tracking-[0.2em] text-[#f4f1ec]/60">
          {{ event.category }}
        </p>
        <h2 class="mb-3 text-xl font-bold">{{ event.title }}</h2>
        <p class="mb-4 text-sm text-white/70">{{ event.description }}</p>
        <div class="text-sm text-white/80">{{ event.date }}</div>
      </article>
    }
  </div>
</section>
