<header class="navbar">
  <div class="soft-container navbar-inner">
    <a routerLink="/" class="brand">
      <span>SOFT</span>
      <span>CLUB</span>
    </a>

    <button
      class="menu-toggle md:hidden"
      type="button"
      (click)="isMenuOpen = !isMenuOpen"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Ouvrir le menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-desktop">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        Accueil
      </a>
      <a routerLink="/menu" routerLinkActive="active-link">Menu</a>
      <a routerLink="/events" routerLinkActive="active-link">Événements</a>
      <a routerLink="/vip" routerLinkActive="active-link">VIP</a>
      <a routerLink="/contact" routerLinkActive="active-link">Contact</a>
    </nav>
  </div>

  <div class="mobile-menu" [class.open]="isMenuOpen">
    <nav class="mobile-nav">
      <a
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="isMenuOpen = false"
      >
        Accueil
      </a>
      <a routerLink="/menu" routerLinkActive="active-link" (click)="isMenuOpen = false"> Menu </a>
      <a routerLink="/events" routerLinkActive="active-link" (click)="isMenuOpen = false">
        Événements
      </a>
      <a routerLink="/vip" routerLinkActive="active-link" (click)="isMenuOpen = false"> VIP </a>
      <a routerLink="/contact" routerLinkActive="active-link" (click)="isMenuOpen = false">
        Contact
      </a>
    </nav>
  </div>
</header>
