<header class="navbar">
  <div class="soft-container navbar-inner">
    <a routerLink="/" class="brand">
      <span>SOFT</span>
      <span>CLUB</span>
    </a>

    <button
      class="menu-toggle md:hidden"
      type="button"
      (click)="isMenuOpen = !isMenuOpen"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Ouvrir le menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="nav-desktop">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        Accueil
      </a>
      <a routerLink="/menu" routerLinkActive="active-link">Menu</a>
      <a routerLink="/events" routerLinkActive="active-link">Événements</a>
      <a routerLink="/vip" routerLinkActive="active-link">VIP</a>
      <a routerLink="/contact" routerLinkActive="active-link">Contact</a>

      <!-- 🔐 AUTH PART -->
      <div class="ml-6 flex items-center gap-3">
        <!-- ❌ NOT LOGGED -->
        <ng-container *ngIf="!isLogged()">
          <a routerLink="/login" class="soft-btn-outline">Connexion</a>
        </ng-container>

        <!-- ✅ LOGGED -->
        <ng-container *ngIf="isLogged()">
          <!-- ADMIN / WORKER -->
          <a *ngIf="getRole() === 'ADMIN'" routerLink="/admin" class="soft-btn"> Admin </a>

          <a *ngIf="getRole() === 'WORKER'" routerLink="/dashboard/staff" class="soft-btn">
            Staff
          </a>

          <!-- VIP -->
          <a *ngIf="getRole() === 'VIP'" routerLink="/dashboard/vip" class="soft-btn">
            Mon espace
          </a>

          <!-- LOGOUT -->
          <button (click)="logout()" class="soft-btn-danger">Logout</button>
        </ng-container>
      </div>
    </nav>
  </div>

  <div class="mobile-menu" [class.open]="isMenuOpen">
    <nav class="mobile-nav">
      <a
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="isMenuOpen = false"
      >
        Accueil
      </a>
      <a routerLink="/menu" routerLinkActive="active-link" (click)="isMenuOpen = false"> Menu </a>
      <a routerLink="/events" routerLinkActive="active-link" (click)="isMenuOpen = false">
        Événements
      </a>
      <a routerLink="/vip" routerLinkActive="active-link" (click)="isMenuOpen = false"> VIP </a>
      <a routerLink="/contact" routerLinkActive="active-link" (click)="isMenuOpen = false">
        Contact
      </a>
      <!-- AUTH MOBILE -->
      <div class="mt-4 flex flex-col gap-2 px-4">
        <ng-container *ngIf="!isLogged()">
          <a routerLink="/login" class="soft-btn w-full" (click)="isMenuOpen = false">
            Connexion
          </a>
        </ng-container>

        <ng-container *ngIf="isLogged()">
          <a
            *ngIf="getRole() === 'ADMIN'"
            routerLink="/admin"
            class="soft-btn w-full"
            (click)="isMenuOpen = false"
          >
            Admin
          </a>

          <a
            *ngIf="getRole() === 'WORKER'"
            routerLink="/dashboard/staff"
            class="soft-btn w-full"
            (click)="isMenuOpen = false"
          >
            Staff
          </a>

          <button (click)="logout(); isMenuOpen = false" class="soft-btn-danger w-full">
            Logout
          </button>
        </ng-container>
      </div>
    </nav>
  </div>
</header>
